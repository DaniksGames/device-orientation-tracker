<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Физика шариков — 2D / 3D с датчиками телефона</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0a0f1e;
            width: 100vw;
            height: 100vh;           /* фиксируем высоту body */
            font-family: system-ui, 'Segoe UI', sans-serif;
            overflow: hidden;        /* body не прокручивается, прокрутку обеспечит app-container */
        }

        .app-container {
            width: 100%;
            height: 100vh;           /* фиксированная высота экрана */
            background: #0f172a;
            display: flex;
            flex-direction: column;
            overflow-y: auto;        /* прокрутка, если контент вылезает */
            overflow-x: hidden;
            position: relative;
        }

        /* В полноэкранном режиме отключаем прокрутку, скрываем панели */
        .fullscreen-mode {
            overflow: hidden !important;
            height: 100vh;
        }

        .fullscreen-mode .tabs,
        .fullscreen-mode .info-panel {
            display: none;           /* полностью убираем панели из потока */
        }

        /* Контейнер с режимом занимает всё свободное место */
        .mode-container {
            display: none;
            flex: 1;
            width: 100%;
            position: relative;
            min-height: 0;
        }

        .mode-container.active-mode {
            display: flex;
            flex-direction: column;
        }

        /* В полноэкранном режиме активный режим растягивается на весь экран */
        .fullscreen-mode .mode-container.active-mode {
            flex: 1;
            height: 100%;
        }

        #canvas2d {
            display: block;
            width: 100%;
            height: 100%;
            background: #111827;
            border-radius: 0;
            box-shadow: none;
        }

        #threeContainer {
            width: 100%;
            height: 100%;
            position: relative;
            background: #0f172a;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 12px 16px 8px 16px;
            flex-shrink: 0;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10;
            border-bottom: 1px solid #2d3a5e;
        }

        .tab-btn {
            background: #1e293b;
            border: none;
            padding: 8px 28px;
            border-radius: 3rem;
            font-weight: bold;
            color: #94a3b8;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .tab-btn.active {
            background: #3b82f6;
            color: white;
            box-shadow: 0 2px 8px rgba(59,130,246,0.4);
        }

        .info-panel {
            flex-shrink: 0;
            padding: 8px 16px 12px 16px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border-top: 1px solid #2d3a5e;
            z-index: 10;
        }

        details {
            background: #0f172ad9;
            border-radius: 2rem;
            padding: 6px 12px;
            color: #cbd5e6;
            font-size: 0.75rem;
            font-family: monospace;
        }

        summary {
            cursor: pointer;
            font-weight: 500;
            padding: 4px;
        }

        .sensor-data {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 6px;
            align-items: baseline;
        }

        .sensor-data span {
            color: #7dd3fc;
            white-space: nowrap;
        }

        .sensor-data br {
            display: none;
        }

        .status {
            background: #1e2a3a;
            border-radius: 2rem;
            padding: 5px 12px;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 6px;
            color: #94a3b8;
        }

        .sensor-activate-btn {
            margin-top: 6px;
            margin-bottom: 4px;
            width: 100%;
            background: #3b82f6;
            border: none;
            padding: 8px;
            border-radius: 3rem;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .sensor-activate-btn:hover {
            background: #2563eb;
        }

        .fullscreen-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.4);
            color: white;
            font-size: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 2000;
            transition: 0.2s;
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            font-family: monospace;
        }

        .fullscreen-btn:hover {
            background: rgba(59,130,246,0.9);
            transform: scale(1.05);
        }

        .orientation-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            font-weight: bold;
            padding: 2rem;
            transition: opacity 0.3s;
            font-size: 1.3rem;
        }

        .orientation-warning.hidden {
            display: none;
        }

        .warning-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            filter: drop-shadow(2px 2px 4px rgba(0,0,0,0.5));
        }

        .warning-text {
            max-width: 300px;
            background: rgba(0,0,0,0.6);
            padding: 1.2rem;
            border-radius: 2rem;
            line-height: 1.4;
        }

        .warning-text strong {
            color: #facc15;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <div class="tabs" id="tabsBar">
        <button class="tab-btn active" data-mode="2d">2D</button>
        <button class="tab-btn" data-mode="3d">3D</button>
    </div>

    <div id="mode2d" class="mode-container active-mode">
        <canvas id="canvas2d"></canvas>
    </div>

    <div id="mode3d" class="mode-container">
        <div id="threeContainer"></div>
    </div>

    <div class="info-panel" id="infoPanel">
        <details>
            <summary>Технические данные датчиков</summary>
            <div class="sensor-data">
                <span>Наклон β: <span id="betaVal">0.0</span>°</span>
                <span>γ: <span id="gammaVal">0.0</span>°</span>
                <span>Акселерометр X: <span id="accXval">0.00</span></span>
                <span>Y: <span id="accYval">0.00</span></span>
                <span>Z: <span id="accZval">0.00</span></span>
            </div>
        </details>
        <div class="status" id="statusMsg">
            Нажмите кнопку ниже для доступа к датчикам
        </div>
        <button id="requestSensorBtn" class="sensor-activate-btn">Активировать датчики</button>
    </div>
</div>

<div id="fullscreenBtn" class="fullscreen-btn" title="Полноэкранный режим">⛶</div>

<div id="orientationWarning" class="orientation-warning hidden">
    <div class="warning-icon">↻</div>
    <div class="warning-text">
        Поверните устройство вертикально (портретная ориентация)<br><br>
        и отключите автоповорот экрана для корректной работы датчиков.
    </div>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // --------------------------------------------------------------
    // 1. ДАТЧИКИ
    // --------------------------------------------------------------
    let beta = 0, gamma = 0;
    let filteredAccX = 0, filteredAccY = 0, filteredAccZ = 0;
    const ACC_FILTER = 0.3;
    let orientationGranted = false, motionGranted = false;

    const betaSpan = document.getElementById('betaVal');
    const gammaSpan = document.getElementById('gammaVal');
    const accXspan = document.getElementById('accXval');
    const accYspan = document.getElementById('accYval');
    const accZspan = document.getElementById('accZval');
    const statusDiv = document.getElementById('statusMsg');
    const requestBtn = document.getElementById('requestSensorBtn');

    function handleOrientation(e) {
        if (!orientationGranted) return;
        if (e.beta !== null) beta = e.beta;
        if (e.gamma !== null) gamma = e.gamma;
        betaSpan.textContent = beta.toFixed(1);
        gammaSpan.textContent = gamma.toFixed(1);
    }
    
    function handleMotion(e) {
        if (!motionGranted) return;
        if (e.acceleration) {
            let rawX = e.acceleration.x || 0;
            let rawY = e.acceleration.y || 0;
            let rawZ = e.acceleration.z || 0;
            filteredAccX = filteredAccX * (1 - ACC_FILTER) + rawX * ACC_FILTER;
            filteredAccY = filteredAccY * (1 - ACC_FILTER) + rawY * ACC_FILTER;
            filteredAccZ = filteredAccZ * (1 - ACC_FILTER) + rawZ * ACC_FILTER;
            accXspan.textContent = filteredAccX.toFixed(2);
            accYspan.textContent = filteredAccY.toFixed(2);
            accZspan.textContent = filteredAccZ.toFixed(2);
        }
    }

    async function requestSensors() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const perm = await DeviceOrientationEvent.requestPermission();
                if (perm === 'granted') {
                    orientationGranted = true;
                    window.addEventListener('deviceorientation', handleOrientation);
                } else {
                    statusDiv.innerHTML = "Отказано в доступе к ориентации";
                    return;
                }
            } catch(e) { console.warn(e); }
        } else {
            orientationGranted = true;
            window.addEventListener('deviceorientation', handleOrientation);
        }
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            try {
                const motionPerm = await DeviceMotionEvent.requestPermission();
                if (motionPerm === 'granted') {
                    motionGranted = true;
                    window.addEventListener('devicemotion', handleMotion);
                }
            } catch(e) { console.warn(e); }
        } else {
            motionGranted = true;
            window.addEventListener('devicemotion', handleMotion);
        }
        statusDiv.innerHTML = "Датчики активны. Поворачивайте и трясите телефон.";
        requestBtn.style.opacity = '0.6';
        requestBtn.disabled = true;
        requestBtn.textContent = "Датчики активны";
    }

    requestBtn.addEventListener('click', requestSensors);
    
    if (!(typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function')) {
        setTimeout(() => {
            if (!orientationGranted && !motionGranted) {
                orientationGranted = true;
                motionGranted = true;
                window.addEventListener('deviceorientation', handleOrientation);
                window.addEventListener('devicemotion', handleMotion);
                statusDiv.innerHTML = "Датчики активны (авто)";
                requestBtn.style.display = 'none';
            }
        }, 500);
    }

    // --------------------------------------------------------------
    // 2. 2D МОДУЛЬ
    // --------------------------------------------------------------
    let canvas2d = document.getElementById('canvas2d');
    let ctx = canvas2d.getContext('2d');
    let width = 0, height = 0;
    let particles2d = [];
    const PARTICLE_COUNT = 14;
    const GRAVITY_BASE = 950;
    const ACCEL_SCALE = 180;
    const ACCEL_BOOST = 1.8;
    const BASE_AIR_DRAG = 0.995;
    const NORMAL_FRICTION_FACTOR = 0.75;
    const BOUNCE_DAMP = 0.85;
    const COLLISION_ELASTIC = 0.55;
    const MIN_SPEED = 0.8;
    
    class Particle2D {
        constructor(x, y, r, vx = 0, vy = 0) {
            this.x = x; this.y = y; this.r = r; 
            this.vx = vx; this.vy = vy; 
            this.mass = r * r;
        }
    }
    
    function init2DParticles(currentWidth, currentHeight) {
        if (currentWidth === 0 || currentHeight === 0) return [];
        let pList = [];
        let radii = [16, 14, 18, 12, 15, 17, 13, 16, 14, 18, 15, 13, 17, 12];
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let r = radii[i % radii.length];
            let overlap = true, tries = 0, x, y;
            while (overlap && tries < 500) {
                overlap = false;
                x = r + Math.random() * (currentWidth - 2 * r);
                y = r + Math.random() * (currentHeight - 2 * r);
                for (let p of pList) {
                    if (Math.hypot(p.x - x, p.y - y) < p.r + r) {
                        overlap = true;
                        break;
                    }
                }
                tries++;
            }
            pList.push(new Particle2D(x, y, r, 0, 0));
        }
        return pList;
    }
    
    function handleCollisions2D() {
        for (let i = 0; i < particles2d.length; i++) {
            for (let j = i+1; j < particles2d.length; j++) {
                const p1 = particles2d[i], p2 = particles2d[j];
                const dx = p2.x - p1.x, dy = p2.y - p1.y;
                const dist = Math.hypot(dx, dy);
                const minDist = p1.r + p2.r;
                if (dist < minDist) {
                    const overlap = minDist - dist;
                    const angle = Math.atan2(dy, dx);
                    const cos = Math.cos(angle), sin = Math.sin(angle);
                    const move1 = overlap * (p2.mass / (p1.mass + p2.mass));
                    const move2 = overlap * (p1.mass / (p1.mass + p2.mass));
                    p1.x -= move1 * cos; p1.y -= move1 * sin;
                    p2.x += move2 * cos; p2.y += move2 * sin;
                    const vrelx = p2.vx - p1.vx, vrely = p2.vy - p1.vy;
                    const dot = vrelx * cos + vrely * sin;
                    if (dot < 0) {
                        const e = COLLISION_ELASTIC;
                        const m1 = p1.mass, m2 = p2.mass;
                        const imp = (1 + e) * dot / ((1 / m1) + (1 / m2));
                        p1.vx += imp * cos / m1; p1.vy += imp * sin / m1;
                        p2.vx -= imp * cos / m2; p2.vy -= imp * sin / m2;
                    }
                }
            }
        }
    }
    
    function handleBoundaries2D() {
        for (let p of particles2d) {
            if (p.x - p.r < 0) { p.x = p.r; p.vx = -p.vx * BOUNCE_DAMP; }
            if (p.x + p.r > width) { p.x = width - p.r; p.vx = -p.vx * BOUNCE_DAMP; }
            if (p.y - p.r < 0) { p.y = p.r; p.vy = -p.vy * BOUNCE_DAMP; }
            if (p.y + p.r > height) { p.y = height - p.r; p.vy = -p.vy * BOUNCE_DAMP; }
            if (Math.abs(p.vx) < MIN_SPEED && Math.abs(p.vy) < MIN_SPEED &&
                ((p.x - p.r < 2) || (p.x + p.r > width - 2) || (p.y - p.r < 2) || (p.y + p.r > height - 2))) {
                if (p.x - p.r < 2) p.vx += 0.5;
                if (p.x + p.r > width - 2) p.vx -= 0.5;
                if (p.y - p.r < 2) p.vy += 0.5;
                if (p.y + p.r > height - 2) p.vy -= 0.5;
            }
        }
    }
    
    function update2DPhysics(dt) {
        let correctedGamma = gamma;
        if (beta > 150 || beta < -150) correctedGamma = -gamma;
        const radBeta = beta * Math.PI / 180;
        const radGamma = correctedGamma * Math.PI / 180;
        let gravX = GRAVITY_BASE * Math.sin(radGamma);
        let gravY = GRAVITY_BASE * Math.sin(radBeta);
        let accX = filteredAccX * ACCEL_SCALE;
        let accY = filteredAccY * ACCEL_SCALE;
        if (Math.abs(filteredAccX) > 5) accX *= ACCEL_BOOST;
        if (Math.abs(filteredAccY) > 5) accY *= ACCEL_BOOST;
        let totalForceX = gravX + accX;
        let totalForceY = gravY + accY;
        let normalForce = Math.abs(Math.cos(radBeta));
        let dragFactor = 1 - NORMAL_FRICTION_FACTOR * normalForce;
        let finalDrag = BASE_AIR_DRAG * Math.max(0.98, dragFactor);
        for (let p of particles2d) {
            p.vx += totalForceX * dt;
            p.vy += totalForceY * dt;
            p.vx *= finalDrag;
            p.vy *= finalDrag;
            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }
        for (let iter = 0; iter < 3; iter++) {
            handleCollisions2D();
            handleBoundaries2D();
        }
    }
    
    function draw2D() {
        if (!ctx || width === 0 || height === 0) return;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = "#0f172a";
        ctx.fillRect(0, 0, width, height);
        ctx.shadowBlur = 6;
        ctx.shadowColor = "rgba(0,0,0,0.5)";
        for (let p of particles2d) {
            let grad = ctx.createRadialGradient(p.x - 3, p.y - 3, 3, p.x, p.y, p.r);
            grad.addColorStop(0, '#fbbf24');
            grad.addColorStop(1, '#ea580c');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#ffffffaa";
            ctx.lineWidth = 1.2;
            ctx.stroke();
        }
        ctx.shadowBlur = 0;
    }
    
    function resizeAndReset2D() {
        const container = document.getElementById('mode2d');
        if (!container) return;
        const rect = container.getBoundingClientRect();
        let newWidth = Math.max(100, rect.width);
        let newHeight = Math.max(100, rect.height);
        if (newWidth === width && newHeight === height) return;
        width = newWidth;
        height = newHeight;
        const dpr = window.devicePixelRatio || 1;
        canvas2d.width = width * dpr;
        canvas2d.height = height * dpr;
        canvas2d.style.width = `${width}px`;
        canvas2d.style.height = `${height}px`;
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.scale(dpr, dpr);
        particles2d = init2DParticles(width, height);
    }
    
    // --------------------------------------------------------------
    // 3. 3D МОДУЛЬ
    // --------------------------------------------------------------
    let scene, camera, renderer, spheres = [], sphereMeshes = [];
    let sphereVelocities = [];
    const SPHERE_COUNT = 14;
    const BOX_DEPTH = 16.0;
    const SPHERE_RADII = [0.76, 0.68, 0.84, 0.64, 0.72, 0.80, 0.70, 0.76, 0.66, 0.82, 0.64, 0.74, 0.72, 0.78];
    const GRAVITY_BASE_3D = 14.0;
    const ACCEL_SCALE_3D = 5.2;
    const ACCEL_BOOST_3D = 1.25;
    const AIR_DRAG_3D = 0.99;
    const WALL_DAMP_3D = 0.90;
    
    let threeRunning = false;
    let lastTimestamp3d = 0;
    let threeContainer = document.getElementById('threeContainer');
    let currentBoxWidth = 6.0;
    let currentBoxHeight = 6.0;
    let wireframeLines = null;
    
    function updateCubeAndCamera() {
        if (!threeContainer || !camera || !renderer) return;
        const rect = threeContainer.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) {
            // Если размеры ещё нулевые, попробуем позже
            setTimeout(() => updateCubeAndCamera(), 50);
            return;
        }
        const aspect = rect.width / rect.height;
        const baseWidth = 7.0;
        const worldWidth = baseWidth;
        const worldHeight = worldWidth / aspect;
        currentBoxWidth = worldWidth;
        currentBoxHeight = worldHeight;
        
        const fov = 45 * Math.PI / 180;
        const distance = (worldHeight / 2) / Math.tan(fov / 2);
        camera.fov = 45;
        camera.aspect = aspect;
        camera.position.set(0, 0, distance);
        camera.lookAt(0, 0, 0);
        camera.updateProjectionMatrix();
        renderer.setSize(rect.width, rect.height);
        
        if (wireframeLines) scene.remove(wireframeLines);
        const boxGeo = new THREE.BoxGeometry(currentBoxWidth, currentBoxHeight, BOX_DEPTH);
        const edgesGeo = new THREE.EdgesGeometry(boxGeo);
        const wireMat = new THREE.LineBasicMaterial({ color: 0x60a5fa });
        wireframeLines = new THREE.LineSegments(edgesGeo, wireMat);
        wireframeLines.name = "cubeEdges";
        scene.add(wireframeLines);
        
        const halfX = currentBoxWidth / 2;
        const halfY = currentBoxHeight / 2;
        const halfZ = BOX_DEPTH / 2;
        for (let i = 0; i < sphereMeshes.length; i++) {
            const r = spheres[i].r;
            const pos = sphereMeshes[i].position;
            pos.x = Math.min(Math.max(pos.x, -halfX + r), halfX - r);
            pos.y = Math.min(Math.max(pos.y, -halfY + r), halfY - r);
            pos.z = Math.min(Math.max(pos.z, -halfZ + r), halfZ - r);
        }
    }
    
    function init3D() {
        if (renderer) {
            renderer.dispose();
            while (threeContainer.firstChild) threeContainer.removeChild(threeContainer.firstChild);
        }
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);
        
        camera = new THREE.PerspectiveCamera(45, 1, 0.1, 50);
        camera.position.set(0, 0, 8);
        camera.lookAt(0, 0, 0);
        
        // Временно зададим небольшие размеры, чтобы не было ошибок
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(100, 100);
        threeContainer.appendChild(renderer.domElement);
        
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.95);
        mainLight.position.set(2.5, 3, 4);
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x88aaff, 0.45);
        fillLight.position.set(-1.2, 1.2, 2.5);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0x6688dd, 0.35);
        backLight.position.set(0, 0.5, -3.5);
        scene.add(backLight);
        
        spheres = [];
        sphereMeshes = [];
        sphereVelocities = [];
        for (let i = 0; i < SPHERE_COUNT; i++) {
            let r = SPHERE_RADII[i % SPHERE_RADII.length];
            const hue = 0.07 + Math.random() * 0.14;
            const saturation = 0.65;
            const lightness = 0.68;
            const color = new THREE.Color().setHSL(hue, saturation, lightness);
            const geometry = new THREE.SphereGeometry(r, 56, 56);
            const material = new THREE.MeshStandardMaterial({ color: color, roughness: 0.28, metalness: 0.08 });
            const sphere = new THREE.Mesh(geometry, material);
            let x = (Math.random() - 0.5) * 5.5;
            let y = (Math.random() - 0.5) * 5.5;
            let z = (Math.random() - 0.5) * (BOX_DEPTH - 2 * r);
            sphere.position.set(x, y, z);
            scene.add(sphere);
            sphereMeshes.push(sphere);
            spheres.push({ r: r, mass: r * r * r });
            sphereVelocities.push({ x: 0, y: 0, z: 0 });
        }
        // Обновим камеру и размеры после инициализации
        setTimeout(() => updateCubeAndCamera(), 20);
    }
    
    function update3DPhysics(dt) {
        let correctedGamma = gamma;
        if (beta > 150 || beta < -150) correctedGamma = -gamma;
        const radBeta = beta * Math.PI / 180;
        const radGamma = correctedGamma * Math.PI / 180;
        let gravX = GRAVITY_BASE_3D * Math.sin(radGamma);
        let gravY = -GRAVITY_BASE_3D * Math.sin(radBeta);
        let gravZ = -GRAVITY_BASE_3D * Math.cos(radBeta) * Math.cos(radGamma);
        let accX = filteredAccX * ACCEL_SCALE_3D;
        let accY = -filteredAccY * ACCEL_SCALE_3D;
        let accZ = -filteredAccZ * ACCEL_SCALE_3D;
        if (Math.abs(filteredAccX) > 5) accX *= ACCEL_BOOST_3D;
        if (Math.abs(filteredAccY) > 5) accY *= ACCEL_BOOST_3D;
        if (Math.abs(filteredAccZ) > 5) accZ *= ACCEL_BOOST_3D;
        
        let totalForceX = gravX + accX;
        let totalForceY = gravY + accY;
        let totalForceZ = gravZ + accZ;
        
        const halfX = currentBoxWidth / 2;
        const halfY = currentBoxHeight / 2;
        const halfZ = BOX_DEPTH / 2;
        
        for (let i = 0; i < spheres.length; i++) {
            let vel = sphereVelocities[i];
            vel.x += totalForceX * dt;
            vel.y += totalForceY * dt;
            vel.z += totalForceZ * dt;
            vel.x *= AIR_DRAG_3D;
            vel.y *= AIR_DRAG_3D;
            vel.z *= AIR_DRAG_3D;
            let pos = sphereMeshes[i].position;
            pos.x += vel.x * dt;
            pos.y += vel.y * dt;
            pos.z += vel.z * dt;
            let r = spheres[i].r;
            if (pos.x + r > halfX) { pos.x = halfX - r; vel.x = -vel.x * WALL_DAMP_3D; }
            if (pos.x - r < -halfX) { pos.x = -halfX + r; vel.x = -vel.x * WALL_DAMP_3D; }
            if (pos.y + r > halfY) { pos.y = halfY - r; vel.y = -vel.y * WALL_DAMP_3D; }
            if (pos.y - r < -halfY) { pos.y = -halfY + r; vel.y = -vel.y * WALL_DAMP_3D; }
            if (pos.z + r > halfZ) { pos.z = halfZ - r; vel.z = -vel.z * WALL_DAMP_3D; }
            if (pos.z - r < -halfZ) { pos.z = -halfZ + r; vel.z = -vel.z * WALL_DAMP_3D; }
        }
        
        for (let i = 0; i < spheres.length; i++) {
            for (let j = i+1; j < spheres.length; j++) {
                let p1 = sphereMeshes[i].position, p2 = sphereMeshes[j].position;
                let dx = p2.x - p1.x, dy = p2.y - p1.y, dz = p2.z - p1.z;
                let dist = Math.hypot(dx, dy, dz);
                let minDist = spheres[i].r + spheres[j].r;
                if (dist < minDist) {
                    let overlap = minDist - dist;
                    let nx = dx / dist, ny = dy / dist, nz = dz / dist;
                    let corr = overlap * 0.5;
                    p1.x -= nx * corr; p1.y -= ny * corr; p1.z -= nz * corr;
                    p2.x += nx * corr; p2.y += ny * corr; p2.z += nz * corr;
                    let vrelx = sphereVelocities[j].x - sphereVelocities[i].x;
                    let vrely = sphereVelocities[j].y - sphereVelocities[i].y;
                    let vrelz = sphereVelocities[j].z - sphereVelocities[i].z;
                    let dot = vrelx * nx + vrely * ny + vrelz * nz;
                    if (dot < 0) {
                        let e = 0.55;
                        let m1 = spheres[i].mass, m2 = spheres[j].mass;
                        let imp = (1 + e) * dot / ((1 / m1) + (1 / m2));
                        sphereVelocities[i].x += imp * nx / m1;
                        sphereVelocities[i].y += imp * ny / m1;
                        sphereVelocities[i].z += imp * nz / m1;
                        sphereVelocities[j].x -= imp * nx / m2;
                        sphereVelocities[j].y -= imp * ny / m2;
                        sphereVelocities[j].z -= imp * nz / m2;
                    }
                }
            }
        }
    }
    
    function animate3D(time) {
        if (!threeRunning) return;
        if (!lastTimestamp3d) { lastTimestamp3d = time; requestAnimationFrame(animate3D); return; }
        let dt = Math.min(0.033, (time - lastTimestamp3d) / 1000);
        if (dt > 0) update3DPhysics(dt);
        lastTimestamp3d = time;
        if (renderer && scene && camera) {
            renderer.render(scene, camera);
        }
        requestAnimationFrame(animate3D);
    }
    
    function start3D() {
        if (threeRunning) return;
        init3D();
        threeRunning = true;
        lastTimestamp3d = 0;
        requestAnimationFrame(animate3D);
    }
    
    function stop3D() {
        threeRunning = false;
        if (renderer) {
            renderer.dispose();
            if (threeContainer) threeContainer.innerHTML = '';
            renderer = null;
        }
    }
    
    // --------------------------------------------------------------
    // 4. ПЕРЕКЛЮЧЕНИЕ РЕЖИМОВ
    // --------------------------------------------------------------
    let mode2dActive = true;
    let anim2dId = null;
    
    function start2DAnimation() {
        if (anim2dId) cancelAnimationFrame(anim2dId);
        let lastTime = 0;
        function loop2d(now) {
            if (!mode2dActive) return;
            if (!lastTime) { lastTime = now; requestAnimationFrame(loop2d); return; }
            let dt = Math.min(0.033, (now - lastTime) / 1000);
            if (dt > 0 && width > 0 && height > 0 && particles2d.length) {
                update2DPhysics(dt);
                draw2D();
            }
            lastTime = now;
            requestAnimationFrame(loop2d);
        }
        anim2dId = requestAnimationFrame(loop2d);
    }
    
    function stop2DAnimation() {
        if (anim2dId) { cancelAnimationFrame(anim2dId); anim2dId = null; }
    }
    
    function handleGlobalResize() {
        if (mode2dActive) {
            resizeAndReset2D();
        } else {
            if (renderer && threeContainer) {
                updateCubeAndCamera();
            }
        }
        checkOrientation();
    }
    
    window.addEventListener('resize', handleGlobalResize);
    
    function init2DFullscreen() {
        resizeAndReset2D();
        start2DAnimation();
    }
    
    const mode2dDiv = document.getElementById('mode2d');
    const mode3dDiv = document.getElementById('mode3d');
    const tabBtns = document.querySelectorAll('.tab-btn');
    
    tabBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            tabBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            if (btn.dataset.mode === '2d') {
                mode2dActive = true;
                mode2dDiv.classList.add('active-mode');
                mode3dDiv.classList.remove('active-mode');
                stop3D();
                stop2DAnimation();
                resizeAndReset2D();
                start2DAnimation();
            } else {
                mode2dActive = false;
                mode2dDiv.classList.remove('active-mode');
                mode3dDiv.classList.add('active-mode');
                stop2DAnimation();
                start3D();
            }
        });
    });
    
    init2DFullscreen();
    
    // --------------------------------------------------------------
    // 5. ПОЛНОЭКРАННЫЙ РЕЖИМ
    // --------------------------------------------------------------
    const appContainer = document.getElementById('appContainer');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    
    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().then(() => {
                appContainer.classList.add('fullscreen-mode');
                setTimeout(() => handleGlobalResize(), 50);
            }).catch(err => console.warn(err));
        } else {
            document.exitFullscreen().then(() => {
                appContainer.classList.remove('fullscreen-mode');
                setTimeout(() => handleGlobalResize(), 50);
            }).catch(err => console.warn(err));
        }
    }
    
    fullscreenBtn.addEventListener('click', toggleFullscreen);
    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement) {
            appContainer.classList.add('fullscreen-mode');
            fullscreenBtn.textContent = '✕';
            fullscreenBtn.title = 'Выйти из полноэкранного режима';
            handleGlobalResize();
        } else {
            appContainer.classList.remove('fullscreen-mode');
            fullscreenBtn.textContent = '⛶';
            fullscreenBtn.title = 'Полноэкранный режим';
            handleGlobalResize();
        }
    });
    
    // --------------------------------------------------------------
    // 6. ПРЕДУПРЕЖДЕНИЕ О ВЕРТИКАЛЬНОЙ ОРИЕНТАЦИИ
    // --------------------------------------------------------------
    const warningDiv = document.getElementById('orientationWarning');
    
    function checkOrientation() {
        if (window.innerWidth > window.innerHeight) {
            warningDiv.classList.remove('hidden');
        } else {
            warningDiv.classList.add('hidden');
        }
    }
    
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('load', checkOrientation);
    checkOrientation();
    setInterval(checkOrientation, 2000);
</script>
</body>
</html>
